services:

  # ── Node / Express API ────────────────────────────────────────────────────
  - type: web
    name: resume-node-api
    runtime: node
    rootDir: backend         # folder name in your repo — adjust if different
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # set this in Render dashboard — never commit it
      - key: LOGIC_API_URL
        # After deploying the Python service below, paste its Render URL here
        # e.g. https://resume-python-api.onrender.com
        sync: false
      - key: FRONTEND_URL
        # Your Vercel URL e.g. https://your-app.vercel.app
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads  # Render filesystem is read-only except /tmp

  # ── Python / FastAPI Logic ────────────────────────────────────────────────
  - type: web
    name: resume-python-api
    runtime: python
    rootDir: logic           # folder name in your repo — adjust if different
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PORT
        value: 8000
      - key: HF_API_KEY
        sync: false          # set in Render dashboard